<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1020"/>
      <stop offset="100%" stop-color="#060912"/>
    </linearGradient>
    <linearGradient id="house" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <g filter="url(#glow)" transform="translate(96,96)">
    <!-- House roof -->
    <polygon points="0,-52 -48,-10 -38,-10 -38,30 38,30 38,-10 48,-10"
             fill="url(#house)" opacity="0.9"/>
    <!-- Door -->
    <rect x="-10" y="2" width="20" height="28" rx="3" fill="#060912" opacity="0.7"/>
    <!-- Window left -->
    <rect x="-34" y="-2" width="16" height="14" rx="2" fill="#060912" opacity="0.5"/>
    <!-- Window right -->
    <rect x="18" y="-2" width="16" height="14" rx="2" fill="#060912" opacity="0.5"/>
    <!-- Window glow -->
    <rect x="-33" y="-1" width="14" height="12" rx="2" fill="#fbbf24" opacity="0.6"/>
    <rect x="19" y="-1" width="14" height="12" rx="2" fill="#34d399" opacity="0.6"/>
  </g>
</svg>
