<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1020"/>
      <stop offset="100%" stop-color="#060912"/>
    </linearGradient>
    <linearGradient id="house" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <g filter="url(#glow)" transform="translate(256,256)">
    <!-- House roof -->
    <polygon points="0,-130 -120,-26 -95,-26 -95,75 95,75 95,-26 120,-26"
             fill="url(#house)" opacity="0.9"/>
    <!-- Door -->
    <rect x="-24" y="5" width="48" height="70" rx="6" fill="#060912" opacity="0.7"/>
    <!-- Window left -->
    <rect x="-85" y="-6" width="40" height="35" rx="5" fill="#060912" opacity="0.5"/>
    <!-- Window right -->
    <rect x="45" y="-6" width="40" height="35" rx="5" fill="#060912" opacity="0.5"/>
    <!-- Window glow -->
    <rect x="-82" y="-3" width="34" height="29" rx="4" fill="#fbbf24" opacity="0.6"/>
    <rect x="48" y="-3" width="34" height="29" rx="4" fill="#34d399" opacity="0.6"/>
  </g>
</svg>
